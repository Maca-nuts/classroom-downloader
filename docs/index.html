<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Classroom Downloader Command Builder</title>
    <meta
      name="description"
      content="Google Classroom Drive Downloader の実行コマンドを画面で作成できます。"
    >
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-labelledby="app-title">
        <div class="intro">
          <div>
            <p class="eyebrow">Google Classroom Drive Downloader</p>
            <h1 id="app-title">コマンドビルダー</h1>
          </div>
          <a class="repo-link" href="https://github.com/Maca-nuts/classroom-downloader" target="_blank" rel="noreferrer">
            GitHub
          </a>
        </div>

        <div class="panel-grid">
          <form class="controls" id="command-form">
            <fieldset>
              <legend>対象</legend>
              <label>
                <span>Course ID</span>
                <input id="course-id" type="text" placeholder="例: 1234567890" autocomplete="off">
              </label>
              <label>
                <span>保存先</span>
                <input id="output-dir" type="text" value="downloads" autocomplete="off">
              </label>
            </fieldset>

            <fieldset>
              <legend>Google ファイル</legend>
              <div class="segmented" role="radiogroup" aria-label="Export format">
                <label>
                  <input type="radio" name="export-format" value="pdf" checked>
                  <span>PDF</span>
                </label>
                <label>
                  <input type="radio" name="export-format" value="office">
                  <span>Office</span>
                </label>
              </div>
              <label class="check-row">
                <input id="include-archived" type="checkbox">
                <span>アーカイブ済みコースも対象にする</span>
              </label>
            </fieldset>

            <fieldset>
              <legend>日付</legend>
              <div class="segmented" role="radiogroup" aria-label="Date field">
                <label>
                  <input type="radio" name="date-field" value="modified" checked>
                  <span>更新日</span>
                </label>
                <label>
                  <input type="radio" name="date-field" value="created">
                  <span>作成日</span>
                </label>
              </div>
              <div class="two-col">
                <label>
                  <span>開始日</span>
                  <input id="start-date" type="date">
                </label>
                <label>
                  <span>終了日</span>
                  <input id="end-date" type="date">
                </label>
              </div>
            </fieldset>

            <fieldset>
              <legend>拡張子</legend>
              <label>
                <span>ホワイトリスト</span>
                <input id="include-ext" type="text" placeholder="pdf, docx, png" autocomplete="off">
              </label>
              <label>
                <span>ブラックリスト</span>
                <input id="exclude-ext" type="text" placeholder="zip, exe" autocomplete="off">
              </label>
            </fieldset>
          </form>

          <aside class="output-panel" aria-live="polite">
            <div class="status-card" id="status-card">
              <div class="status-dot" aria-hidden="true"></div>
              <p id="status-text">Course ID を入力してください。</p>
            </div>

            <div class="command-card">
              <div class="card-toolbar">
                <h2>実行コマンド</h2>
                <button id="copy-command" type="button">コピー</button>
              </div>
              <pre><code id="command-output"></code></pre>
            </div>

            <div class="steps">
              <h2>公開後に必要な操作</h2>
              <ol>
                <li>GitHub の Settings で Pages を開く</li>
                <li>Source を Deploy from a branch にする</li>
                <li>Branch にこのブランチ、Folder に /docs を指定する</li>
              </ol>
            </div>
          </aside>
        </div>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
